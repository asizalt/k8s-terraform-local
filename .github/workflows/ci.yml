name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  deploy-test-destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Build Docker image
        run: docker build -t local/web-app:latest ./app

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Create cluster
        working-directory: terraform
        run: terraform apply -target=module.cluster -target=local_file.kubeconfig -auto-approve

      - name: Load image into kind
        run: |
          docker save local/web-app:latest -o /tmp/web-app.tar
          for node in $(kind get nodes --name local-cluster); do
            docker cp /tmp/web-app.tar ${node}:/tmp/web-app.tar
            docker exec ${node} ctr -n k8s.io images import /tmp/web-app.tar
          done

      - name: Deploy everything
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Test endpoints
        run: |
          curl -f --retry 5 --retry-delay 5 --retry-connrefused http://localhost/app-1
          curl -f --retry 5 --retry-delay 5 --retry-connrefused http://localhost/app-2
          curl -f --retry 5 --retry-delay 5 --retry-connrefused http://localhost/app-3
          curl -f --retry 5 --retry-delay 5 --retry-connrefused http://localhost/podinfo

      - name: Destroy
        if: always()
        working-directory: terraform
        run: terraform destroy -auto-approve
